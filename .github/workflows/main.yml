name: API Tests

on:
  push:
    branches: [ master ]      # <-- исправлено
  pull_request:
    branches: [ master ]      # <-- исправлено

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: mvn test

      - name: Debug structure BEFORE upload
        if: always()
        run: |
          echo "=== Текущая директория ==="
          pwd
          echo "=== Полный список файлов в корне проекта ==="
          ls -la
          echo "=== Проверка существования allure-results ==="
          if [ -d "allure-results" ]; then
            echo "ПАПКА allure-results СУЩЕСТВУЕТ"
            ls -la allure-results/
          else
            echo "ПАПКА allure-results НЕ НАЙДЕНА"
          fi

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./allure-results
          if-no-files-found: warn